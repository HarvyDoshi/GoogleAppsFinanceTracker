# configs/grpo_config.yaml
# Trace — GRPO Training Configuration (Unsloth + TRL + RLVR)

# ── Model ─────────────────────────────────────────────────────────────────────
model_name: "unsloth/Qwen2.5-3B-Instruct"   # fast & fits in Colab T4
max_seq_length: 4096
load_in_4bit: true

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_r: 32
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── SFT Warm-Start (per guide: "do a little SFT first, then RL") ─────────────
sft:
  enabled: true                        # set false to skip SFT and go direct GRPO
  epochs: 2
  lr: 2.0e-4
  batch_size: 4
  grad_accum: 2
  max_seq_length: 2048
  dataset_path: "./data/sft_demos.jsonl"  # generated by generate_sft_data.py
  checkpoint_path: "./outputs/trace-sft"

# ── GRPO Hyperparameters (tuned per hackathon guide) ──────────────────────────
epochs: 3
batch_size: 2
grad_accum: 4
lr: 5.0e-6                             # lower than SFT — fine-tune, don't overwrite
warmup_ratio: 0.1
lr_scheduler_type: "cosine"
max_new_tokens: 512
temperature: 0.9                        # more exploration during training
num_generations: 8                      # GRPO group size — more rollouts = better signal
kl_coef: 0.05                          # prevent policy collapse away from SFT base
max_completion_length: 512
max_prompt_length: 1536

# ── vLLM (optional — faster rollout generation) ──────────────────────────────
use_vllm: false
vllm_gpu_memory_fraction: 0.5

# ── Curriculum ────────────────────────────────────────────────────────────────
n_tasks: 200
curriculum:
  easy_until_step: 50
  medium_until_step: 150
  hard_from_step: 150
  # Weighted sampling — smoother transitions between difficulty tiers
  transition_window: 20                 # steps over which to blend probabilities

# ── Reward Functions ──────────────────────────────────────────────────────────
# Multiple independent reward functions (per guide: "use multiple independent
# reward functions, not just one")
reward_functions:
  - format_compliance                   # valid JSON, correct schema
  - answer_correctness                  # numeric accuracy, keyword match
  - step_efficiency                     # fewer steps = better
  - process_ordering                    # PLAN→RETRIEVE→VERIFY→ANSWER sequence
  - anti_hack                           # penalize detected exploit patterns

# ── Export & Quantization ─────────────────────────────────────────────────────
export:
  merged_16bit: true                    # always save full-precision merged
  merged_4bit: false                    # optional 4-bit merged
  gguf: true                           # export GGUF for Ollama/llama.cpp
  gguf_quant_methods:
    - "q4_k_m"                          # good balance of quality/size
    - "q8_0"                            # higher quality, larger
  push_to_hub: false                    # set true + HF_TOKEN to push
  hub_repo: ""                          # e.g. "username/trace-grpo-qwen2.5-3b"

# ── Output ────────────────────────────────────────────────────────────────────
output_dir: "./outputs/trace-grpo"
save_path: "./outputs/trace-final"
save_steps: 50
logging_steps: 1
report_to: "wandb"
